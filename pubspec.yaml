name: sekita
description: "Aplikasi Sekita — temukan jasa profesional di sekitarmu."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  url_launcher: ^6.2.5
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

# Ikon aplikasi Sekita. Jalankan: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icon/sekita_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/img/wa.png
