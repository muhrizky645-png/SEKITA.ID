name: sekita
description: "Aplikasi Sekita — temukan jasa profesional di sekitarmu."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  url_launcher: ^6.2.5
  shared_preferences: ^2.2.2
  image_picker: ^1.1.2
  google_sign_in: ^6.2.1
  onesignal_flutter: ^5.2.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

# Ikon aplikasi. sekita_icon.png dipakai sbg ikon legacy (penuh) DAN sbg
# foreground ikon adaptif, dgn latar biru brand supaya tidak ada garis putih.
# Jalankan: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icon/sekita_icon.png"
  adaptive_icon_background: "#2563EB"
  adaptive_icon_foreground: "assets/icon/sekita_icon.png"
  min_sdk_android: 21

# Catatan: splash native diatur manual (lihat android/.../res/.../launch_background.xml
# & values-v31/styles.xml). Tidak memakai flutter_native_splash lagi supaya buka
# app langsung ke layar loading Flutter tanpa logo ke-crop.

flutter:
  uses-material-design: true
  assets:
    - assets/icon/sekita_icon.png
