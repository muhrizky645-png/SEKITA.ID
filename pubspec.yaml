name: sekita
description: "Aplikasi Sekita — temukan jasa profesional di sekitarmu."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  url_launcher: ^6.2.5
  shared_preferences: ^2.2.2
  image_picker: ^1.1.2
  google_sign_in: ^6.2.1
  onesignal_flutter: ^5.2.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icon/sekita_icon.png"
  min_sdk_android: 21

# Splash native (layar peluncuran) memakai logo Sekita asli di atas latar biru
# brand. Jalankan: flutter pub get && dart run flutter_native_splash:create
flutter_native_splash:
  color: "#2563EB"
  image: assets/icon/sekita_icon.png
  android_12:
    color: "#2563EB"
    image: assets/icon/sekita_icon.png
  android: true
  ios: false
  web: false

flutter:
  uses-material-design: true
  assets:
    - assets/icon/sekita_icon.png
