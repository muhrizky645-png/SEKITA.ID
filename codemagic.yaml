# Codemagic CI/CD - Sekita (Flutter Android)
# Docs: docs.codemagic.io/yaml-quick-start/building-a-flutter-app
#
# ADA 2 WORKFLOW (pilih saat Start new build):
#   1) android-testing -> BISA LANGSUNG JALAN, TANPA keystore.
#      Hasil: APK (ditandatangani debug key) untuk tes/sideload di HP.
#   2) android-release -> untuk Play Store (AAB + APK tanda tangan rilis).
#      BUTUH upload keystore dulu di Codemagic:
#      Teams -> Code signing identities -> Android keystores -> upload
#      sekita-release.jks, Reference name PERSIS: sekita_keystore, alias: sekita.
#      Belum punya keystore? Bikin:
#      keytool -genkey -v -keystore sekita-release.jks -keyalg RSA -keysize 2048 -validity 10000 -alias sekita

workflows:
  android-testing:
    name: Sekita APK (tes - tanpa keystore)
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Flutter analyze (tidak memblokir build)
        script: flutter analyze || true
      - name: Build APK (release, fallback debug-signing)
        script: flutter build apk --release --build-number=$BUILD_NUMBER
    artifacts:
      - build/**/outputs/**/*.apk

  android-release:
    name: Sekita Android Release (Play Store)
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      flutter: stable
      java: 17
      android_signing:
        - sekita_keystore   # HARUS sama dengan Reference name keystore di Codemagic
    scripts:
      - name: Buat android/key.properties dari keystore Codemagic
        script: |
          set -e
          cat > android/key.properties <<EOF
          storeFile=$CM_KEYSTORE_PATH
          storePassword=$CM_KEYSTORE_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          keyPassword=$CM_KEY_PASSWORD
          EOF
      - name: Flutter pub get
        script: flutter pub get
      - name: Build AAB + APK (rilis)
        script: |
          flutter build appbundle --release --build-number=$BUILD_NUMBER
          flutter build apk --release --build-number=$BUILD_NUMBER
    artifacts:
      - build/**/outputs/bundle/**/*.aab
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/mapping.txt
